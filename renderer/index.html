<!doctype html>
<html lang="hu">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
    <title>Wattsy</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="panel">
      <header>
        <div class="title-wrap">
          <span class="title" id="appTitle">Wattsy</span>
          <span class="title-tagline" id="appTagline">AI usage monitor</span>
        </div>
        <div class="header-actions">
          <button id="minimizeBtn" title="Minimize">–</button>
          <button id="settingsBtn" title="Settings">⚙</button>
          <button id="refreshBtn" title="Refresh now">⟳</button>
        </div>
      </header>

      <div class="view-row">
        <select id="viewSelect" class="view-select"></select>
      </div>

      <div id="providers" class="providers"></div>

      <footer>
        <span id="statusLine">Betöltés…</span>
      </footer>

      <div id="settingsView" class="settings-view hidden">
        <div class="settings-header">
          <button id="backBtn" title="Back">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="10,3 5,8 10,13" />
            </svg>
          </button>
          <span id="settingsTitle">Beállítások</span>
          <span class="spacer"></span>
        </div>
        <div class="settings-body">
          <div class="settings-group-label" id="languageLabel">Nyelv</div>
          <div id="langOptions"></div>

          <div class="settings-group-label" id="intervalLabel">Frissítési gyakoriság</div>
          <select id="intervalSelect" class="interval-select">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="15">15</option>
            <option value="30">30</option>
          </select>

          <div class="settings-group-label" id="windowLabel">Egyéb</div>
          <label class="lang-option">
            <input type="checkbox" id="alwaysOnTopCheckbox" />
            <span id="alwaysOnTopLabel">Ablak mindig felül</span>
          </label>

          <button id="aboutBtn" class="about-open-btn" type="button">
            <span id="aboutBtnLabel">ⓘ Névjegy</span>
          </button>
        </div>
      </div>

      <div id="aboutModal" class="about-modal hidden">
        <div class="about-modal-backdrop" id="aboutModalBackdrop"></div>
        <div class="about-modal-box">
          <div class="about-row">
            <span id="aboutCreatedByLabel">Készítette</span>: Zsolt Janes
          </div>
          <div class="about-row">
            <a href="#" id="aboutEmailLink" data-url="mailto:hello@janes.hu">hello@janes.hu</a>
          </div>
          <div class="about-row">
            <a href="#" id="aboutWebsiteLink" data-url="https://janes.hu">janes.hu</a>
          </div>
          <div class="about-row about-subtle" id="aboutBuiltWith">Claude Code segítségével készült</div>
          <div class="about-row about-subtle" id="aboutVersionLine">Version: –</div>
          <button id="aboutCloseBtn" class="about-close-btn" type="button">×</button>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
