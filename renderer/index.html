<!doctype html>
<html lang="hu">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
    <title>Claude Usage</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="panel">
      <header>
        <span class="title" id="appTitle">Claude Code Usage</span>
        <div class="header-actions">
          <button id="minimizeBtn" title="Minimize">–</button>
          <button id="settingsBtn" title="Settings">⚙</button>
          <button id="refreshBtn" title="Refresh now">⟳</button>
        </div>
      </header>

      <section class="gauges">
        <div class="gauge">
          <div class="gauge-label">
            <span id="session5hLabel">5 órás session</span>
            <span id="sessionPct">–</span>
          </div>
          <div class="bar"><div id="sessionBar" class="bar-fill"></div></div>
          <div class="gauge-sub" id="sessionReset">–</div>
        </div>
        <div class="gauge">
          <div class="gauge-label">
            <span id="weeklyQuotaLabel">Heti kvóta</span>
            <span id="weeklyPct">–</span>
          </div>
          <div class="bar"><div id="weeklyBar" class="bar-fill"></div></div>
          <div class="gauge-sub" id="weeklyReset">–</div>
        </div>
      </section>

      <section class="today">
        <div class="today-cost" id="todayCost">$0.00</div>
        <div class="today-label" id="todayLabel">ma elköltve (becslés)</div>
        <div class="today-tokens" id="todayTokens">0 token</div>
      </section>

      <section class="chart" id="chart"></section>

      <section class="models">
        <div class="models-subtitle" id="modelsSubtitle">Utolsó 7 nap alapján</div>
        <table>
          <thead>
            <tr>
              <th id="thModel">Modell</th>
              <th id="thTokens">Token</th>
              <th id="thCost">$</th>
            </tr>
          </thead>
          <tbody id="modelRows"></tbody>
        </table>
      </section>

      <footer>
        <span id="statusLine">Betöltés…</span>
      </footer>

      <div id="settingsView" class="settings-view hidden">
        <div class="settings-header">
          <button id="backBtn" title="Back">←</button>
          <span id="settingsTitle">Beállítások</span>
          <span class="spacer"></span>
        </div>
        <div class="settings-body">
          <div class="settings-group-label" id="languageLabel">Nyelv</div>
          <label class="lang-option">
            <input type="radio" name="lang" value="hu" id="langHuRadio" />
            <span>Magyar</span>
          </label>
          <label class="lang-option">
            <input type="radio" name="lang" value="en" id="langEnRadio" />
            <span>English</span>
          </label>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
